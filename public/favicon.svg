<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#1a6fff"/>
      <stop offset="100%" stop-color="#0041b8"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="white" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="100" height="100" rx="20" fill="url(#bg)"/>
  <!-- Subtle top-to-bottom shine -->
  <rect width="100" height="55" rx="20" fill="url(#shine)"/>
  <!-- PK monogram -->
  <text
    x="50" y="67"
    text-anchor="middle"
    fill="white"
    font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-weight="800"
    font-size="46"
    letter-spacing="-1">PK</text>
</svg>
